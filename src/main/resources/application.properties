spring.application.name=myapp

spring.jpa.hibernate.ddl-auto=create
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
server.port=${PORT:8080}
spring.datasource.url=jdbc:h2:mem:book_store;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver
spring.h2.console.enabled=true
# spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
# spring.datasource.url=jdbc:mysql://localhost:3306/book_store
# spring.datasource.username=root

jwt.duration=604800000
jwt.secret=THIS_IS_A_VERY_LONG_SECRET_KEY_AT_LEAST_64_CHARACTERS_LONG_FOR_HS512
